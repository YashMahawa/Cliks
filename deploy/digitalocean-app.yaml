name: cliks-backend
region: blr
services:
  - name: api
    github:
      repo: YashMahawa/Cliks
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: cd server && go build -trimpath -ldflags="-s -w" -o dist/cliks-server .
    run_command: server/dist/cliks-server
    environment_slug: go
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8787
    health_check:
      http_path: /health
    routes:
      - path: /
    envs:
      - key: GO_VERSION
        value: "1.24"
        scope: RUN_AND_BUILD_TIME
