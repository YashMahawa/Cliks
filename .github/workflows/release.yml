name: Release CLI

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  native-unix:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: cliks-linux-amd64
          - os: macos-15-intel
            asset: cliks-macos-amd64
          - os: macos-15
            asset: cliks-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Verify tag matches CLI version
        shell: bash
        run: |
          cli_version="$(cd cli && go run . version)"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$cli_version" = "$tag_version" || {
            echo "Tag $GITHUB_REF_NAME does not match CLI version $cli_version"
            exit 1
          }
      - name: Test
        working-directory: cli
        run: go test ./...
      - name: Build native archive
        working-directory: cli
        shell: bash
        run: |
          go build -trimpath -ldflags="-s -w" -o cliks .
          if [ "${{ runner.os }}" = "macOS" ]; then
            chmod +x macos-capture-helper/build.sh
            macos-capture-helper/build.sh "Cliks Capture.app"
            tar -czf "../${{ matrix.asset }}.tar.gz" cliks "Cliks Capture.app"
          else
            go build -trimpath -ldflags="-s -w" -o cliks-capture-helper ./linux-capture-helper
            cp linux-capture-helper/cliks-capture.service .
            tar -czf "../${{ matrix.asset }}.tar.gz" cliks cliks-capture-helper cliks-capture.service
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  native-windows:
    name: cliks-windows-amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Verify tag matches CLI version
        shell: bash
        run: |
          cli_version="$(cd cli && go run . version)"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$cli_version" = "$tag_version"
      - name: Test Windows CLI
        working-directory: cli
        run: go test ./...
      - name: Build Windows archive
        working-directory: cli
        shell: pwsh
        run: |
          go build -trimpath -ldflags="-s -w" -o cliks.exe .
          Compress-Archive -Path cliks.exe -DestinationPath "../cliks-windows-amd64.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: cliks-windows-amd64
          path: cliks-windows-amd64.zip
          if-no-files-found: error

  linux-arm64:
    name: cliks-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - working-directory: cli
        run: go test ./...
      - name: Build
        working-directory: cli
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o cliks .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o cliks-capture-helper ./linux-capture-helper
          cp linux-capture-helper/cliks-capture.service .
          tar -czf ../cliks-linux-arm64.tar.gz cliks cliks-capture-helper cliks-capture.service
      - uses: actions/upload-artifact@v7
        with:
          name: cliks-linux-arm64
          path: cliks-linux-arm64.tar.gz

  publish:
    needs: [native-unix, native-windows, linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
          files: dist/*
