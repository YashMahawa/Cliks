name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check and build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            cli/go.sum
            server/go.sum

      - run: npm ci

      - run: npm run check

      - run: npm run build

      - name: CLI doctor smoke
        run: ./cli/dist/cliks doctor

      - name: Server smoke
        run: npm run smoke:server

      - name: Installer syntax
        if: runner.os != 'Windows'
        run: bash -n cli/install.sh

      - name: PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: '[scriptblock]::Create((Get-Content -Raw cli/install.ps1)) | Out-Null'

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t cliks-server:ci .
